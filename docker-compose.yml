version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: family_sync_db
    restart: always
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: bots_go
    ports:
      - "5433:5432"
    volumes:
      # Монтируем данные во внутреннюю папку контейнера
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
